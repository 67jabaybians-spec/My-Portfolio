<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Dev Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 3rem;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #334155;
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>My Portfolio</h1>
  <p>I build websites, games, and interactive experiences</p>
</header>

<div class="container">

  <div class="card" onclick="loadDemo('business')">
    <h2>Business Website</h2>
    <p>Modern company layout</p>
  </div>

  <div class="card" onclick="loadDemo('dashboard')">
    <h2>Dashboard UI</h2>
    <p>Admin panel concept</p>
  </div>

  <div class="card" onclick="loadDemo('game')">
    <h2>Game UI</h2>
    <p>HUD + menu system</p>
  </div>

</div>

<div id="viewer"></div>

<script>
function loadDemo(type) {
  let html = "";

  if (type === "business") {
    html = `
      <h2>Business Demo</h2>
      <p>We build amazing things</p>
      <button>Contact Us</button>
    `;
  }

  if (type === "dashboard") {
    html = `
      <h2>Dashboard</h2>
      <div style="display:flex; gap:10px;">
        <div style="background:#0ea5e9; padding:20px;">Users: 120</div>
        <div style="background:#22c55e; padding:20px;">Sales: 430</div>
      </div>
    `;
  }

  if (type === "game") {
    html = `
      <h2>Game UI</h2>
      <p>Health: ███████░░</p>
      <button>Start Game</button>
    `;
  }

  document.getElementById("viewer").innerHTML = html;
}
</script>

</body>
</html>
